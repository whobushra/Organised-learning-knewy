<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script src="../scripts/site-base.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — KNEWY</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="styles/site.css" />
    <link rel="stylesheet" href="styles/feedback.css" />
  </head>
  <body class="with-site-chrome d-flex flex-column min-vh-100">
    <div class="body-bg" aria-hidden="true"></div>

    <div id="head-container"></div>

    <main class="site-main flex-grow-1 w-100">
      <div class="site-content py-5 feedback-page">
        <header class="feedback-intro text-center mb-5">
          <h1 class="text-primary fw-bold">Your feedback matters</h1>
          <p class="text-muted mx-auto lead">
            We would love to hear your thoughts, concerns, or ideas so we can improve KNEWY.
          </p>
        </header>

        <form method="POST" autocomplete="off" name="google-sheet" class="feedback-form card border-0 shadow-sm">
          <div class="mb-3">
            <label for="fb-name" class="form-label">Name</label>
            <input type="text" name="name" class="form-control" id="fb-name" placeholder="Your name" />
          </div>
          <div class="mb-3">
            <label for="fb-email" class="form-label">Email</label>
            <input
              type="email"
              name="email"
              class="form-control"
              id="fb-email"
              placeholder="you@example.com"
              aria-describedby="fb-email-help"
            />
            <div id="fb-email-help" class="form-text">We will never share your email.</div>
          </div>
          <div class="mb-3">
            <label for="fb-contact" class="form-label">Contact number <span class="text-muted">(optional)</span></label>
            <input type="text" name="contact" class="form-control" id="fb-contact" />
          </div>
          <div class="mb-4">
            <label for="fb-feedback" class="form-label">Your feedback</label>
            <textarea name="feedback" class="form-control" id="fb-feedback" rows="4" placeholder="Tell us what you think…"></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-lg rounded-pill px-5">Send feedback</button>
        </form>
      </div>
    </main>

    <div id="foot-container"></div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj"
      crossorigin="anonymous"
    ></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.1/jquery.min.js"></script>
    <script src="scripts/index.js"></script>
    <script>
      const scriptURL =
        "https://script.google.com/macros/s/AKfycbzv-_6af1iiMjRouD9WeMRWbRVztTf1kp0EGs8Q0uVvFTWT3P8/exec";
      const form = document.forms["google-sheet"];
      form.addEventListener("submit", function (e) {
        e.preventDefault();
        fetch(scriptURL, { method: "POST", body: new FormData(form) })
          .then(function () {
            alert("Thanks for reaching out. We will get back to you soon.");
          })
          .catch(function (err) {
            console.error("Error!", err.message);
          });
      });
    </script>
  </body>
</html>
